name: Tauri Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install webview2-runtime -y
          choco install llvm -y

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Strip BOM from JSON configs
        run: |
          node -e "
          const fs = require('fs');
          function stripBom(file) {
            const buf = fs.readFileSync(file);
            if (buf[0] === 0xEF && buf[1] === 0xBB && buf[2] === 0xBF) {
              fs.writeFileSync(file, buf.slice(3));
              console.log('BOM stripped: ' + file);
            } else {
              console.log('Clean: ' + file);
            }
          }
          stripBom('package.json');
          stripBom('src-tauri/tauri.conf.json');
          "
        shell: bash

      - name: Build Tauri app (manual with debug)
        run: |
          echo "=== Building Tauri ${{ matrix.bundles }} ==="
          npx tauri build --bundles ${{ matrix.bundles }} --verbose 2>&1 | tee tauri-build.log
        working-directory: ./

      - name: Upload MSI artifact
        if: matrix.bundles == 'msi'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64_en-US.msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

      - name: Upload MSI signature
        if: matrix.bundles == 'msi'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64_en-US.msi.sig
          path: src-tauri/target/release/bundle/msi/*.msi.sig
          retention-days: 90

      - name: Upload NSIS artifact
        if: matrix.bundles == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64-setup.exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90

      - name: Upload NSIS signature
        if: matrix.bundles == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64-setup.exe.sig
          path: src-tauri/target/release/bundle/nsis/*.exe.sig
          retention-days: 90

      - name: Upload build log (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.bundles }}
          path: tauri-build.log
          retention-days: 30

      - name: Create GitHub Release with assets
        if: matrix.bundles == 'nsis'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tauri Update Manifest
        if: matrix.bundles == 'nsis'
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const version = '${{ github.ref_name }}';
          const versionClean = version.replace(/^v/, '');
          
          // Find signature files using fs.readdirSync (no glob dependency)
          function findSigFile(dir, pattern) {
            try {
              const files = fs.readdirSync(dir);
              const match = files.find(f => f.endsWith(pattern));
              return match ? path.join(dir, match) : null;
            } catch { return null; }
          }
          
          const sigNsisPath = findSigFile('src-tauri/target/release/bundle/nsis', '.exe.sig');
          const sigMsiPath = findSigFile('src-tauri/target/release/bundle/msi', '.msi.sig');
          
          const sigNsis = sigNsisPath ? fs.readFileSync(sigNsisPath, 'utf8').trim() : '';
          const sigMsi = sigMsiPath ? fs.readFileSync(sigMsiPath, 'utf8').trim() : '';
          
          const manifest = {
            version: versionClean,
            notes: `Release ${version}`,
            pub_date: new Date().toISOString(),
            platforms: {
              'windows-x86_64': {
                signature: sigNsis,
                url: `https://github.com/sebdrd1/seb_Atlantis/releases/download/${version}/seb_Atlantis_${versionClean}_x64-setup.exe`
              },
              'windows-x86_64-msi': {
                signature: sigMsi,
                url: `https://github.com/sebdrd1/seb_Atlantis/releases/download/${version}/seb_Atlantis_${versionClean}_x64_en-US.msi`
              }
            }
          };
          
          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log('=== Generated latest.json ===');
          console.log(JSON.stringify(manifest, null, 2));
          "
        shell: bash

      - name: Deploy Update Manifest to GitHub Pages
        if: matrix.bundles == 'nsis'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Tauri update manifest for ${{ github.ref_name }}'
          full_commit_message: 'Deploy Tauri update manifest for ${{ github.ref_name }}'
          cname: ''
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

