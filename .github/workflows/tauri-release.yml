name: Tauri Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install webview2-runtime -y
          choco install llvm -y

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workdir: './src-tauri'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Rust (release)
        run: cargo build --release --manifest-path ./src-tauri/Cargo.toml
        working-directory: ./src-tauri

      - name: Build frontend
        run: npm run build

      - name: Import signing key
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Release ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
          projectPath: ./

      - name: Upload MSI artifact
        if: matrix.bundles == 'msi'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64_en-US.msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

      - name: Upload NSIS artifact
        if: matrix.bundles == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: seb_Atlantis-${{ github.ref_name }}_x64-setup.exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90

      - name: Create Release
        if: always()
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## seb_Atlantis ${{ github.ref_name }}
            
            ### Downloads
            - **Windows Installer (MSI)**: `seb_Atlantis-${{ github.ref_name }}_x64_en-US.msi`
            - **Windows Setup (NSIS)**: `seb_Atlantis-${{ github.ref_name }}_x64-setup.exe`
            
            ### Auto-update
            This release is configured for Tauri auto-update. The app will automatically check for updates on startup.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Generate Tauri Update Manifest
        if: matrix.bundles == 'nsis'
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const version = '${{ github.ref_name }}';
          const versionClean = version.replace(/^v/, '');
          
          // Find signature files using fs.readdirSync (no glob dependency)
          function findSigFile(dir, pattern) {
            try {
              const files = fs.readdirSync(dir);
              const match = files.find(f => f.endsWith(pattern));
              return match ? path.join(dir, match) : null;
            } catch { return null; }
          }
          
          const sigNsisPath = findSigFile('src-tauri/target/release/bundle/nsis', '.exe.sig');
          const sigMsiPath = findSigFile('src-tauri/target/release/bundle/msi', '.msi.sig');
          
          const sigNsis = sigNsisPath ? fs.readFileSync(sigNsisPath, 'utf8').trim() : '';
          const sigMsi = sigMsiPath ? fs.readFileSync(sigMsiPath, 'utf8').trim() : '';
          
          const manifest = {
            version: versionClean,
            notes: `Release ${version}`,
            pub_date: new Date().toISOString(),
            platforms: {
              'windows-x86_64': {
                signature: sigNsis,
                url: `https://github.com/sebdrd1/seb_Atlantis/releases/download/${version}/seb_Atlantis_${versionClean}_x64-setup.exe`
              },
              'windows-x86_64-msi': {
                signature: sigMsi,
                url: `https://github.com/sebdrd1/seb_Atlantis/releases/download/${version}/seb_Atlantis_${versionClean}_x64_en-US.msi`
              }
            }
          };
          
          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log('=== Generated latest.json ===');
          console.log(JSON.stringify(manifest, null, 2));
          "
        shell: bash

      - name: Deploy Update Manifest to GitHub Pages
        if: matrix.bundles == 'nsis'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Tauri update manifest for ${{ github.ref_name }}'
          full_commit_message: 'Deploy Tauri update manifest for ${{ github.ref_name }}'
          cname: ''
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



